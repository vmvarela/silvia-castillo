id: "08-puerta-secreta"
titulo: "La Puerta Secreta"
cuento: |
  El heraldo del castillo llega a Silvia con una petición especial: el taller de
  pergaminos (servidor web) del patio exterior (DMZ) necesita recibir visitas de
  los reinos lejanos. Pero hay un secreto: los viajeros deben creer que están
  llamando a la puerta principal del castillo (203.0.113.1:80), cuando en realidad
  el heraldo los redirige en silencio al taller del patio (10.0.0.5:80).

  Esta magia se llama DNAT (Destination NAT): el castillo intercepta el mensaje
  antes de decidir a dónde va (cadena PREROUTING de la tabla nat), cambia la
  dirección de destino, y luego lo encamina correctamente al patio exterior.

  Son necesarias DOS reglas: primero la redirección en PREROUTING con DNAT, y
  luego una regla FORWARD que autorice al mensajero ya redirigido a cruzar
  desde el portón exterior (eth2) al patio (eth1) por el puerto 80.
mision: "Redirige el tráfico al puerto 80 del firewall hacia el servidor DMZ (10.0.0.5) usando DNAT y FORWARD."
red:
  firewall_ip: "192.168.1.1"
  interfaces:
    - nombre: eth0
      zona: lan
      cidr: "192.168.1.0/24"
      ip: "192.168.1.1"
    - nombre: eth1
      zona: dmz
      cidr: "10.0.0.0/24"
      ip: "10.0.0.1"
    - nombre: eth2
      zona: wan
      cidr: "0.0.0.0/0"
      ip: "203.0.113.1"
  hosts:
    - nombre: "Casa Local"
      ip: "192.168.1.10"
      zona: lan
      iface: eth0
    - nombre: "Servidor DMZ"
      ip: "10.0.0.5"
      zona: dmz
      iface: eth1
    - nombre: "Aldea Lejana"
      ip: "203.0.113.5"
      zona: wan
      iface: eth2
politicas:
  INPUT: DROP
  OUTPUT: ACCEPT
  FORWARD: DROP
reglas_iniciales:
  - "-A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT"
  - "-A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT"
pistas:
  - "DNAT se pone en la tabla nat: -t nat -A PREROUTING -i eth2 -p tcp --dport 80 -j DNAT --to-destination 10.0.0.5:80"
  - "Después del DNAT, el paquete va hacia eth1 (DMZ): añade -A FORWARD -i eth2 -o eth1 -p tcp --dport 80 -j ACCEPT"
  - "El heraldo (PREROUTING) actúa ANTES de que el castillo decida si el paquete es para él o para retransmitir."
  - "Sin la regla FORWARD, el DNAT no sirve de nada: hay que abrir el paso después de la redirección."
pruebas:
  - descripcion: "Viajero llama a la puerta principal y es redirigido al taller (WAN → Firewall:80 → DMZ:80)"
    src_ip: "203.0.113.5"
    dst_ip: "203.0.113.1"
    dst_port: 80
    proto: tcp
    estado: NEW
    in_iface: eth2
    esperado: ACCEPT
  - descripcion: "Puerto 22 no redirigido: el castillo lo bloquea (WAN → Firewall:22)"
    src_ip: "203.0.113.5"
    dst_ip: "203.0.113.1"
    dst_port: 22
    proto: tcp
    estado: NEW
    in_iface: eth2
    esperado: DROP
  - descripcion: "Los nobles no llegan directamente al taller sin permiso (LAN → DMZ:80)"
    src_ip: "192.168.1.10"
    dst_ip: "10.0.0.5"
    dst_port: 80
    proto: tcp
    estado: NEW
    in_iface: eth0
    out_iface: eth1
    esperado: DROP
recompensa: "¡Dominas la Puerta Secreta! El heraldo redirige a los viajeros al taller sin que ellos lo sepan. ¡Eres una maestra del DNAT!"
